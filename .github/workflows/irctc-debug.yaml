name: IRCTC Debug - Test Network & App Server

on:
  workflow_dispatch:
    inputs:
      USERNAME:
        required: true
        type: string
        description: "Your IRCTC Username"
      PASSWORD:
        required: true
        type: string
        description: "Your IRCTC Password"
      UPI_ID:
        required: true
        type: string
        description: "Your UPI ID To Make Payment From"

jobs:
  debug-network:
    runs-on: ubuntu-22.04
    name: Debug Network & Connectivity

    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Setup & Start App Server
      run: |
        sudo timedatectl set-timezone Asia/Kolkata
        pip install -r irctc-captcha-solver/requirements.txt
        python3 irctc-captcha-solver/app-server.py --host 127.0.0.1 --port 8000 &
        
        # Wait for app server to start
        sleep 10
        
        PASSWORD=$(jq -r '.inputs.PASSWORD' $GITHUB_EVENT_PATH)
        USERNAME=$(jq -r '.inputs.USERNAME' $GITHUB_EVENT_PATH)
        UPI_ID=$(jq -r '.inputs.UPI_ID' $GITHUB_EVENT_PATH)
        
        echo ::add-mask::$PASSWORD
        echo ::add-mask::$USERNAME
        echo ::add-mask::$UPI_ID
        
        echo PASSWORD=$PASSWORD >> $GITHUB_ENV
        echo USERNAME=$USERNAME >> $GITHUB_ENV
        echo UPI_ID=$UPI_ID >> $GITHUB_ENV

    - name: Test Network Connectivity
      run: |
        echo "====== Testing Network Connectivity ======"
        echo ""
        
        echo "1. Testing if we can reach IRCTC website..."
        if curl -v --max-time 10 https://www.irctc.co.in/nget/train-search 2>&1 | head -20; then
          echo "✅ IRCTC website is reachable"
        else
          echo "❌ IRCTC website is NOT reachable"
        fi
        
        echo ""
        echo "2. Testing if local app-server is running..."
        if curl -v http://localhost:8000/ --max-time 5; then
          echo "✅ App-server is running on localhost:8000"
        else
          echo "❌ App-server is NOT running"
        fi
        
        echo ""
        echo "3. Testing DNS resolution..."
        nslookup www.irctc.co.in || echo "DNS lookup failed"
        
        echo ""
        echo "4. Testing internet connectivity..."
        if ping -c 3 8.8.8.8; then
          echo "✅ Internet is accessible"
        else
          echo "❌ No internet access"
        fi

  test-option-1:
    runs-on: ubuntu-22.04
    name: "Option 1: Keep Real IRCTC + Longer Timeout"
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Setup & Start App Server
      run: |
        sudo timedatectl set-timezone Asia/Kolkata
        pip install -r irctc-captcha-solver/requirements.txt
        python3 irctc-captcha-solver/app-server.py --host 127.0.0.1 --port 8000 &
        
        sleep 10
        
        PASSWORD=$(jq -r '.inputs.PASSWORD' $GITHUB_EVENT_PATH)
        USERNAME=$(jq -r '.inputs.USERNAME' $GITHUB_EVENT_PATH)
        UPI_ID=$(jq -r '.inputs.UPI_ID' $GITHUB_EVENT_PATH)
        
        echo ::add-mask::$PASSWORD
        echo ::add-mask::$USERNAME
        echo ::add-mask::$UPI_ID
        
        echo PASSWORD=$PASSWORD >> $GITHUB_ENV
        echo USERNAME=$USERNAME >> $GITHUB_ENV
        echo UPI_ID=$UPI_ID >> $GITHUB_ENV

    - name: Install Node.js and npm
      uses: actions/setup-node@v4
      with:
        node-version: '20.12.2'

    - name: Running Cypress with Real IRCTC + Higher Timeout
      run: |
        npm install cypress
        npx cypress run --browser chrome --headed --record --key a15b31a6-b9ee-4678-b9ac-f45a190851fe --env UPI_ID=${{ inputs.UPI_ID || '' }},USERNAME=${{ inputs.USERNAME || secrets.USERNAME }},PASSWORD=${{ inputs.PASSWORD || secrets.PASSWORD }}

  test-option-2:
    runs-on: ubuntu-22.04
    name: "Option 2: Use Local App Server (No IRCTC)"
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Setup & Start App Server
      run: |
        sudo timedatectl set-timezone Asia/Kolkata
        pip install -r irctc-captcha-solver/requirements.txt
        python3 irctc-captcha-solver/app-server.py --host 127.0.0.1 --port 8000 &
        
        sleep 10
        
        PASSWORD=$(jq -r '.inputs.PASSWORD' $GITHUB_EVENT_PATH)
        USERNAME=$(jq -r '.inputs.USERNAME' $GITHUB_EVENT_PATH)
        UPI_ID=$(jq -r '.inputs.UPI_ID' $GITHUB_EVENT_PATH)
        
        echo ::add-mask::$PASSWORD
        echo ::add-mask::$USERNAME
        echo ::add-mask::$UPI_ID
        
        echo PASSWORD=$PASSWORD >> $GITHUB_ENV
        echo USERNAME=$USERNAME >> $GITHUB_ENV
        echo UPI_ID=$UPI_ID >> $GITHUB_ENV

    - name: Install Node.js and npm
      uses: actions/setup-node@v4
      with:
        node-version: '20.12.2'

    - name: Running Cypress with Local Server
      run: |
        npm install cypress
        npx cypress run --browser chrome --headed --record --key a15b31a6-b9ee-4678-b9ac-f45a190851fe --env UPI_ID=${{ inputs.UPI_ID || '' }},USERNAME=${{ inputs.USERNAME || secrets.USERNAME }},PASSWORD=${{ inputs.PASSWORD || secrets.PASSWORD }},BASE_URL=http://localhost:8000
